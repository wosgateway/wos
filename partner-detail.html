<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WOS Concierge — พาร์ทเนอร์</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-slate-50">

    <!-- ===== HEADER ===== -->
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100/80">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <a href="home.html" class="text-2xl font-bold text-primary tracking-tight flex items-center gap-1">
                WOS<span class="text-amber-500 font-light text-base align-top">.os</span>
            </a>
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="flex items-center bg-slate-100 rounded-full p-0.5 text-xs font-semibold">
                    <button class="lang-btn active" data-lang="th">TH</button>
                    <button class="lang-btn" data-lang="lo">ລາວ</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 sm:px-6 pt-6">
        <nav class="breadcrumb">
            <a href="home.html">หน้าหลัก</a> <span class="mx-1">/</span>
            <a id="breadcrumbCategory" href="#">หมวดหมู่</a> <span class="mx-1">/</span>
            <span id="breadcrumbCurrent" class="text-slate-800 font-medium">พาร์ทเนอร์</span>
        </nav>
    </div>

    <div id="loadingState" class="max-w-6xl mx-auto px-4 sm:px-6 pt-6">
        <div class="skeleton h-64 mb-6"></div>
        <div class="skeleton h-8 w-1/2 mb-3"></div>
        <div class="skeleton h-4 w-1/3"></div>
    </div>

    <div id="errorState" class="empty-state hidden max-w-6xl mx-auto px-4 sm:px-6">
        <span class="icon">⚠️</span>
        <p>ไม่พบข้อมูลพาร์ทเนอร์ที่ต้องการ</p>
    </div>

    <div id="content" class="hidden">
        <!-- ===== HEADER / GALLERY ===== -->
        <section class="pt-6">
            <div class="max-w-6xl mx-auto px-4 sm:px-6">
                <div class="rounded-3xl overflow-hidden card-shadow shadow-xl mb-4">
                    <img id="mainImage" src="" alt="" class="w-full h-64 sm:h-80 object-cover" />
                </div>
                <div id="galleryThumbs" class="grid grid-cols-4 sm:grid-cols-6 gap-2 mb-8"></div>

                <div class="flex flex-wrap items-start justify-between gap-4 mb-2">
                    <div>
                        <span id="categoryTag" class="text-primary font-semibold text-xs tracking-widest uppercase"></span>
                        <h1 id="partnerName" class="text-2xl sm:text-3xl font-bold text-slate-900 mt-1"></h1>
                        <p id="partnerProvince" class="text-slate-500 text-sm mt-1"></p>
                    </div>
                    <span id="ratingBadge" class="rating-badge text-base"></span>
                </div>
                <p id="partnerDescription" class="text-slate-600 max-w-3xl mt-3 leading-relaxed"></p>
            </div>
        </section>

        <!-- ===== PACKAGES ===== -->
        <section class="section-padding !pt-10">
            <div class="max-w-6xl mx-auto px-4 sm:px-6">
                <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                    <h2 class="text-xl sm:text-2xl font-bold text-slate-900">โปรแกรมและบริการ</h2>
                    <div class="flex gap-2">
                        <button class="filter-pill active" data-filter="all">แพ็กเกจทั้งหมด</button>
                        <button class="filter-pill" data-filter="promo">โปรโมชันพิเศษ 🔥</button>
                    </div>
                </div>

                <div id="packagesLoading" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
                    <div class="skeleton h-40"></div>
                    <div class="skeleton h-40"></div>
                    <div class="skeleton h-40"></div>
                </div>
                <div id="packagesGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5 hidden"></div>
                <div id="packagesEmpty" class="empty-state hidden">
                    <span class="icon">📋</span>
                    <p>ยังไม่มีโปรแกรมในหมวดที่เลือก</p>
                </div>
            </div>
        </section>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="bg-slate-950 text-slate-400 py-8 border-t border-slate-900 text-sm text-center">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <p>&copy; <span id="year"></span> WOS.os — Healthcare Hospitality Concierge</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const partnerId = window.getQueryParam('id');
        let allPackages = [];
        let currentFilter = 'all';

        if (!partnerId) {
            showError();
        } else {
            loadPartner();
        }

        function showError() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
        }

        async function loadPartner() {
            try {
                const partner = await window.fetchPartnerById(partnerId);
                renderPartner(partner);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                loadPackages();
            } catch (err) {
                console.error(err);
                showError();
            }
        }

        function renderPartner(p) {
            document.title = `WOS Concierge — ${p.name}`;
            const images = [p.cover_image_url, ...(p.gallery_urls || [])].filter(Boolean);
            const mainImg = images[0] || 'images/hero/hero-main.webp';

            document.getElementById('mainImage').src = mainImg;
            document.getElementById('mainImage').alt = p.name;
            document.getElementById('partnerName').textContent = p.name;
            document.getElementById('partnerProvince').textContent = `📍 ${p.province || '-'}`;
            document.getElementById('categoryTag').textContent = p.category;
            document.getElementById('ratingBadge').textContent = `⭐ ${p.rating ?? '-'}`;
            document.getElementById('partnerDescription').textContent = p.description || '';
            document.getElementById('breadcrumbCurrent').textContent = p.name;

            const cat = (window.WOS_CATEGORIES || []).find(c => c.dbCategories.includes(p.category));
            if (cat) {
                document.getElementById('breadcrumbCategory').href = `category.html?slug=${cat.slug}`;
                document.getElementById('breadcrumbCategory').textContent = cat.label[window.getCurrentLang()] || cat.label.th;
            }

            const thumbs = images.length > 1 ? images : [mainImg];
            document.getElementById('galleryThumbs').innerHTML = thumbs.map((img, i) => `
                <div class="gallery-thumb ${i === 0 ? 'active' : ''}" onclick="selectImage('${img}', this)">
                    <img src="${img}" alt="gallery ${i + 1}" loading="lazy" />
                </div>
            `).join('');
        }

        window.selectImage = function(src, el) {
            document.getElementById('mainImage').src = src;
            document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        async function loadPackages() {
            try {
                allPackages = await window.fetchPackagesByPartner(partnerId);
                renderPackages();
            } catch (err) {
                console.error(err);
                document.getElementById('packagesLoading').classList.add('hidden');
                document.getElementById('packagesEmpty').classList.remove('hidden');
            }
        }

        function renderPackages() {
            document.getElementById('packagesLoading').classList.add('hidden');
            const filtered = currentFilter === 'promo' ? allPackages.filter(p => p.is_promotion) : allPackages;

            if (!filtered || filtered.length === 0) {
                document.getElementById('packagesGrid').classList.add('hidden');
                document.getElementById('packagesEmpty').classList.remove('hidden');
                return;
            }
            document.getElementById('packagesEmpty').classList.add('hidden');
            const grid = document.getElementById('packagesGrid');
            grid.classList.remove('hidden');
            grid.innerHTML = filtered.map(pkg => `
                <a href="program-detail.html?id=${pkg.id}" class="package-card card-shadow">
                    ${pkg.image_url ? `<img src="${pkg.image_url}" alt="${pkg.title}" loading="lazy" class="w-full h-32 object-cover rounded-xl -mt-1" />` : ''}
                    ${pkg.is_promotion ? '<span class="promo-badge w-fit">🔥 โปรโมชัน</span>' : ''}
                    <h3 class="font-bold text-slate-900">${pkg.title}</h3>
                    <p class="text-sm text-slate-500 line-clamp-2">${pkg.description || ''}</p>
                    <div class="flex items-end gap-2 mt-auto pt-2">
                        ${pkg.special_price ? `<span class="price-original">${window.formatTHB(pkg.original_price)}</span>` : ''}
                        <span class="price-special">${window.formatTHB(pkg.special_price || pkg.original_price)}</span>
                    </div>
                    ${pkg.duration ? `<span class="text-xs text-slate-400">⏱ ${pkg.duration}</span>` : ''}
                </a>
            `).join('');
        }

        document.querySelectorAll('.filter-pill').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderPackages();
            });
        });
    </script>
</body>
</html>
